---
# inventory/hosts.yml
# =============================================================================
# Example inventory for ca_import playbook.
# Replace hostnames and variables with your actual environment.
# =============================================================================

all:
  vars:
    # Default PKI server URL — overridden per group or host as needed
    ca_import_fetch_url: "http://pki.internal:8080/ca/cert.pem"
    ca_import_name:      "pypki-ca"
    ca_import_label:     "PyPKI Internal CA"

  children:

    # -----------------------------------------------------------------------
    # Linux servers — system trust store only
    # -----------------------------------------------------------------------
    linux_servers:
      vars:
        ca_import_system: true
        ca_import_curl:   true
      hosts:
        server01.internal:
          ansible_user: ubuntu
        server02.internal:
          ansible_user: ec2-user
        server03.internal:
          ansible_host: 10.0.1.30
          ansible_user: admin

    # -----------------------------------------------------------------------
    # Java application servers — system + Java cacerts
    # -----------------------------------------------------------------------
    java_servers:
      vars:
        ca_import_system: true
        ca_import_java:   true
        ca_import_java_home: "/usr/lib/jvm/java-17-openjdk-amd64"
      hosts:
        javaapp01.internal:
          ansible_user: ubuntu
        javaapp02.internal:
          ansible_user: ubuntu

    # -----------------------------------------------------------------------
    # Python/ML servers — system + Python certifi
    # -----------------------------------------------------------------------
    python_servers:
      vars:
        ca_import_system:     true
        ca_import_python:     true
        ca_import_python_bin: "python3"
      hosts:
        mlnode01.internal:
          ansible_user: ubuntu
        mlnode02.internal:
          ansible_user: ubuntu

    # -----------------------------------------------------------------------
    # Developer workstations — everything including NSS (Firefox/Chromium)
    # -----------------------------------------------------------------------
    workstations:
      vars:
        ca_import_system:  true
        ca_import_java:    true
        ca_import_python:  true
        ca_import_curl:    true
        ca_import_nss:     true
      hosts:
        dev-laptop-alice:
          ansible_host: 192.168.1.10
          ansible_user: alice
        dev-laptop-bob:
          ansible_host: 192.168.1.11
          ansible_user: bob

    # -----------------------------------------------------------------------
    # macOS machines — Keychain import
    # -----------------------------------------------------------------------
    macos:
      vars:
        ca_import_system:          true   # uses security add-trusted-cert
        ca_import_macos_keychain:  true
        ca_import_nss:             true   # for Chromium NSS on macOS
      hosts:
        mac-ci-runner:
          ansible_host: 192.168.1.50
          ansible_user: ci
          ansible_python_interpreter: /usr/bin/python3

    # -----------------------------------------------------------------------
    # CI/CD runners — system store, inline PEM (no network needed)
    # -----------------------------------------------------------------------
    ci_runners:
      vars:
        ca_import_fetch_url: ""         # override: use inline content instead
        ca_import_pem_content: |
          # Paste your CA cert PEM here, or load from a vault secret:
          # ca_import_pem_content: "{{ lookup('hashi_vault', 'secret/pypki/ca_cert') }}"
          -----BEGIN CERTIFICATE-----
          REPLACE_THIS_WITH_YOUR_ACTUAL_CA_CERT_PEM_CONTENT
          -----END CERTIFICATE-----
        ca_import_system: true
        ca_import_curl:   true
        ca_import_python: true
      hosts:
        runner01.ci.internal:
          ansible_user: runner
        runner02.ci.internal:
          ansible_user: runner
